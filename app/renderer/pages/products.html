<!-- Products Page Content -->
<div id="page-products" class="page-content">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="page-title">Products</h1>
            <p class="page-subtitle">Life Savers, Chevrons, and Stripes inventory</p>
        </div>
        <button id="btn-add-product" class="flex items-center gap-2 btn-primary px-4 py-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add Product
        </button>
    </div>

    <!-- Products Summary Cards -->
    <div class="grid grid-cols-5 gap-4 mb-6">
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Total</p>
            <p id="summary-total-products" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Life Savers</p>
            <p id="summary-life-savers" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Chevrons</p>
            <p id="summary-chevrons" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Stripes</p>
            <p id="summary-stripes" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Stock Value</p>
            <p id="summary-stock-value" class="text-xl font-semibold">KSh 0</p>
        </div>
    </div>

    <!-- Products Table -->
    <div class="dashboard-panel overflow-hidden">
        <table class="w-full data-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Color</th>
                    <th>Size</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products-table-body">
                <tr>
                    <td colspan="5" class="px-6 py-10 text-center text-gray-400">No products added yet</td>
                </tr>
            </tbody>
        </table>
        <div id="products-pagination"></div>
    </div>

    <!-- Add Product Modal -->
    <div id="modal-add-product" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Add New Product</h3>
                <button class="modal-close-btn" id="btn-close-product-modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="add-product-form" action="javascript:void(0);">
                <div class="modal-body">
                    <div class="space-y-5">
                        <!-- Product Type Selection -->
                        <div>
                            <label>Product Type</label>
                            <div id="product-type-selector" class="flex gap-2 mt-1">
                                <button type="button" data-type="life_saver"
                                    class="product-type-btn flex-1 px-4 py-3 border border-gray-900 bg-gray-50 text-sm transition-all flex items-center gap-3">
                                    <svg viewBox="0 0 24 24" class="w-6 h-6">
                                        <polygon points="12,2 22,20 2,20" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
                                        <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a1a">!</text>
                                    </svg>
                                    <div>
                                        <div class="font-medium text-gray-900">Life Saver</div>
                                        <div class="text-xs text-gray-500">Warning triangle</div>
                                    </div>
                                </button>
                                <button type="button" data-type="chevron"
                                    class="product-type-btn flex-1 px-4 py-3 border border-gray-200 bg-white text-sm transition-all hover:border-gray-300">
                                    <div class="font-medium text-gray-500">Chevron</div>
                                    <div class="text-xs text-gray-400">Arrow pattern</div>
                                </button>
                                <button type="button" data-type="stripes"
                                    class="product-type-btn flex-1 px-4 py-3 border border-gray-200 bg-white text-sm transition-all hover:border-gray-300">
                                    <div class="font-medium text-gray-500">Stripes</div>
                                    <div class="text-xs text-gray-400">Line pattern</div>
                                </button>
                            </div>
                            <input type="hidden" name="product_type" id="product-type-input" value="life_saver">
                        </div>

                        <!-- Color Selection -->
                        <div id="color-section" class="hidden">
                            <label>Color</label>
                            <div id="product-color-selector" class="flex gap-2 mt-1">
                                <button type="button" data-color="white_red" data-for="chevron"
                                    class="product-color-btn chevron-color flex-1 px-4 py-3 border border-gray-900 bg-gray-50 text-sm transition-all flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-sm shadow-sm flex-shrink-0" style="background: linear-gradient(135deg, #ffffff 50%, #ef4444 50%);"></div>
                                    <div>
                                        <div class="font-medium text-gray-900">White / Red</div>
                                        <div class="text-xs text-gray-500">Chevron</div>
                                    </div>
                                </button>
                                <button type="button" data-color="yellow_red" data-for="chevron"
                                    class="product-color-btn chevron-color flex-1 px-4 py-3 border border-gray-200 bg-white text-sm transition-all flex items-center gap-3 hover:border-gray-300">
                                    <div class="w-8 h-8 rounded-sm shadow-sm flex-shrink-0" style="background: linear-gradient(135deg, #eab308 50%, #ef4444 50%);"></div>
                                    <div>
                                        <div class="font-medium text-gray-500">Yellow / Red</div>
                                        <div class="text-xs text-gray-400">Chevron</div>
                                    </div>
                                </button>
                                <button type="button" data-color="white" data-for="stripes"
                                    class="product-color-btn stripe-color hidden flex-1 px-4 py-3 border border-gray-900 bg-gray-50 text-sm transition-all flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-sm shadow-sm border border-gray-200 flex-shrink-0" style="background: #ffffff;"></div>
                                    <div>
                                        <div class="font-medium text-gray-900">White</div>
                                        <div class="text-xs text-gray-500">Stripe</div>
                                    </div>
                                </button>
                                <button type="button" data-color="yellow" data-for="stripes"
                                    class="product-color-btn stripe-color hidden flex-1 px-4 py-3 border border-gray-200 bg-white text-sm transition-all flex items-center gap-3 hover:border-gray-300">
                                    <div class="w-8 h-8 rounded-sm shadow-sm flex-shrink-0" style="background: #eab308;"></div>
                                    <div>
                                        <div class="font-medium text-gray-500">Yellow</div>
                                        <div class="text-xs text-gray-400">Stripe</div>
                                    </div>
                                </button>
                            </div>
                            <input type="hidden" name="product_color" id="product-color-input" value="white_red">
                        </div>

                        <!-- Size Selection -->
                        <div id="size-section" class="hidden">
                            <label>Size</label>
                            <div id="product-size-selector" class="flex gap-2 mt-1">
                                <button type="button" data-size="1x1"
                                    class="product-size-btn flex-1 px-4 py-3 border border-gray-900 bg-gray-50 text-sm transition-all">
                                    <div class="font-medium text-gray-900">1x1</div>
                                    <div class="text-xs text-gray-500">Standard</div>
                                </button>
                                <button type="button" data-size="1x2"
                                    class="product-size-btn flex-1 px-4 py-3 border border-gray-200 bg-white text-sm transition-all hover:border-gray-300">
                                    <div class="font-medium text-gray-500">1x2</div>
                                    <div class="text-xs text-gray-400">Large</div>
                                </button>
                            </div>
                            <input type="hidden" name="product_size" id="product-size-input" value="1x1">
                        </div>

                        <!-- Stock Quantity -->
                        <div>
                            <label>Stock Quantity</label>
                            <input type="number" name="stock" required min="1" class="w-full mt-1" placeholder="0">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary px-4 py-2 text-sm" id="btn-cancel-product">Cancel</button>
                    <button type="submit" class="btn-primary px-4 py-2 text-sm">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
