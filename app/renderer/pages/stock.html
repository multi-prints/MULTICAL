<!-- Stock Management Page -->
<div id="page-stock" class="page-content">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="page-title">Stock</h1>
            <p class="page-subtitle">Manage your sticker inventory</p>
        </div>
        <button id="btn-add-stock" class="flex items-center gap-2 btn-primary px-4 py-2 text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add Stock
        </button>
    </div>

    <!-- Stock Summary Cards -->
    <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Total Colors</p>
            <p id="summary-colors" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Total Rolls</p>
            <p id="summary-rolls" class="text-xl font-semibold">0</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Total Metres</p>
            <p id="summary-metres" class="text-xl font-semibold">0m</p>
        </div>
        <div class="stat-card-modern">
            <p class="text-xs text-gray-500 font-medium mb-1">Remaining</p>
            <p id="summary-remaining" class="text-xl font-semibold">0m</p>
        </div>
    </div>

    <!-- Stock Table -->
    <div class="dashboard-panel overflow-hidden">
        <table class="w-full data-table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Color</th>
                    <th>Width</th>
                    <th>Rolls</th>
                    <th>Total m</th>
                    <th>Used</th>
                    <th>Remaining</th>
                    <th>Left</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="stock-table-body">
                <tr>
                    <td colspan="10" class="px-5 py-10 text-center text-gray-400">No stock added yet</td>
                </tr>
            </tbody>
        </table>
        <div id="stock-pagination"></div>
    </div>

    <!-- Add Stock Modal -->
    <div id="modal-add-stock" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Add New Stock</h3>
                <button class="modal-close-btn" id="btn-close-stock-modal">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <form id="add-stock-form" action="javascript:void(0);">
                <div class="modal-body">
                    <div class="space-y-5">
                        <!-- Sticker Type Selection -->
                        <div>
                            <label>Sticker Type</label>
                            <div id="sticker-type-selector" class="flex gap-2 mt-1">
                                <button type="button" data-type="colored"
                                    class="sticker-type-btn flex-1 px-4 py-2 border border-brand-500 bg-brand-50 text-brand-600 font-medium text-sm transition-all">
                                    Colored
                                </button>
                                <button type="button" data-type="reflective"
                                    class="sticker-type-btn flex-1 px-4 py-2 border border-gray-200 bg-white text-gray-500 font-medium text-sm transition-all hover:border-gray-300">
                                    Reflective
                                </button>
                            </div>
                            <input type="hidden" name="sticker_type" id="sticker-type-input" value="colored">
                        </div>

                        <!-- Color Input -->
                        <div>
                            <label id="color-label">Color</label>
                            <div class="relative mt-1">
                                <input type="text" name="color" id="stock-color-input" required class="w-full pr-12"
                                    placeholder="e.g. Red Dark, Black Matte" autocomplete="off">
                                <div id="color-preview" class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 border border-gray-200" style="background-color: #9ca3af;"></div>
                                <div id="color-suggestions" class="absolute z-50 w-full mt-1 bg-white border border-gray-200 shadow-lg max-h-60 overflow-y-auto hidden">
                                </div>
                            </div>
                            <p id="color-hint" class="text-xs text-gray-400 mt-1">Enter color with variant (dark, light, matte, gloss)</p>
                        </div>

                        <!-- Size Rows Container -->
                        <div>
                            <label>Size Variants</label>
                            <div id="size-rows-container" class="space-y-3 mt-2">
                            </div>
                            <button type="button" id="btn-add-size-row" class="mt-3 text-sm text-brand-500 hover:text-brand-600 font-medium flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                </svg>
                                Add size
                            </button>
                        </div>

                        <!-- Total Summary -->
                        <div class="bg-gray-50 border border-gray-100 p-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="font-medium text-gray-600">Total</span>
                                <div class="flex gap-6">
                                    <span class="text-gray-500"><span id="total-rolls" class="font-semibold text-gray-900">0</span> rolls</span>
                                    <span class="text-gray-500"><span id="total-metres" class="font-semibold text-gray-900">0</span>m</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary px-4 py-2 text-sm" id="btn-cancel-stock">Cancel</button>
                    <button type="submit" class="btn-primary px-4 py-2 text-sm">Add Stock</button>
                </div>
            </form>
        </div>
    </div>
</div>
