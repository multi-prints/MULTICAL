name: Auto Tag on Push

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'src-tauri/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for version change
        id: check_version
        run: |
          CURRENT_VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          
          if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
            echo "Tag v$CURRENT_VERSION already exists"
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "Tag v$CURRENT_VERSION does not exist, will create"
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.check_version.outputs.should_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.check_version.outputs.should_tag == 'true'
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          echo "Creating tag v$VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION - Automated build"
          git push origin "v$VERSION"
          echo "✅ Tagged v$VERSION"

      - name: Summary
        run: |
          if [ "${{ steps.check_version.outputs.should_tag }}" == "true" ]; then
            echo "✅ Tagged version ${{ steps.check_version.outputs.version }}"
          else
            echo "ℹ️ Tag already exists, skipping"
          fi
