name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.1.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_glob: target/release/bundle/nsis/*.exe
            artifact_name: multiprints-windows
          - os: ubuntu-latest
            bundle_glob: target/release/bundle/deb/*.deb
            artifact_name: multiprints-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri bundle
        run: cargo tauri build --bundles ${{ matrix.os == 'windows-latest' && 'nsis' || 'deb' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: |
          echo "=== Bundle output ==="
          find target/release/bundle -type f | sort || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          retention-days: 5
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version for release
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "Using tag: $VERSION"
          else
            VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$VERSION" >> $GITHUB_OUTPUT
            echo "Using Cargo version: v$VERSION"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: multiprints-*

      - name: List all artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f -name "*" | sort
          echo ""
          echo "=== File Count ==="
          find artifacts -type f | wc -l

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Final Release Assets ==="
          ls -la release-assets/

      - name: Generate updater manifest
        run: |
          python3 -c '
import datetime
import json
import hashlib
import os
from pathlib import Path

repo = os.environ["GITHUB_REPOSITORY"]
tag = os.environ["RELEASE_TAG"]
version = os.environ["RELEASE_VERSION"]
assets = Path("release-assets")
platforms = {}

for artifact in assets.iterdir():
    if artifact.suffix == ".sig" or artifact.name == "latest.json":
        continue
    if artifact.suffix == ".exe":
        key = "windows-x86_64"
    elif artifact.suffix == ".deb":
        key = "linux-x86_64"
    else:
        continue

    digest = hashlib.sha256(artifact.read_bytes()).hexdigest()
    platforms[key] = {
        "url": f"https://github.com/{repo}/releases/download/{tag}/{artifact.name}",
        "sha256": digest,
    }

manifest = {
    "version": version,
    "notes": "Latest MULTIPRINTS release",
    "pub_date": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
    "platforms": platforms,
}

(assets / "latest.json").write_text(json.dumps(manifest, indent=2))
'
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
          RELEASE_VERSION: ${{ steps.get_version.outputs.semver }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Release Summary
        run: |
          echo "🎉 Build and Release Complete!"
          echo ""
          echo "📦 New release is available at:"
          echo "   https://github.com/${{ github.repository }}/releases"
          echo ""
          echo "🖥️  Platforms built:"
          echo "   • Windows (.exe installer)"
          echo "   • Linux (.deb package)"
