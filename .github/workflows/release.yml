name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.1.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_glob: target/release/bundle/nsis/*.exe
            artifact_name: multiprints-windows
          - os: ubuntu-latest
            bundle_glob: target/release/bundle/deb/*.deb
            artifact_name: multiprints-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Verify Turso secrets are present
        shell: bash
        env:
          MULTIPRINTS_TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          MULTIPRINTS_TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          if [ -z "$MULTIPRINTS_TURSO_DATABASE_URL" ] || [ -z "$MULTIPRINTS_TURSO_AUTH_TOKEN" ]; then
            echo "::error::TURSO_DATABASE_URL / TURSO_AUTH_TOKEN secrets are missing. Multi-PC sync will not work."
            exit 1
          fi
          case "$MULTIPRINTS_TURSO_DATABASE_URL" in
            libsql://*|https://*) echo "Turso URL shape OK" ;;
            *) echo "::error::TURSO_DATABASE_URL must start with libsql:// or https://"; exit 1 ;;
          esac
          echo "Turso secrets present (url length=${#MULTIPRINTS_TURSO_DATABASE_URL}, token length=${#MULTIPRINTS_TURSO_AUTH_TOKEN})"

      - name: Force rebuild multiprints with Turso embeds
        # Avoid shipping a cached binary compiled without secrets.
        shell: bash
        run: |
          cargo clean -p multiprints
          # Bust build-script fingerprint so embedded_turso.rs is always regenerated
          rm -rf target/release/build/multiprints-* target/debug/build/multiprints-* 2>/dev/null || true

      - name: Build Tauri bundle
        run: cargo tauri build --bundles ${{ matrix.os == 'windows-latest' && 'nsis' || 'deb' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary at compile time so installed apps auto-connect to Turso
          # without a manual turso.json step. Set these once under repo Settings → Secrets.
          MULTIPRINTS_TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          MULTIPRINTS_TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Verify Turso URL is inside the built binary
        shell: bash
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        run: |
          set -euo pipefail
          # Extract host portion we expect to find as a string in the binary
          HOST=$(echo "$TURSO_DATABASE_URL" | sed -E 's#^libsql://##; s#^https://##; s#/.*##')
          echo "Looking for host string in binary: $HOST"

          # Windows ships multiprints.exe; Linux ships multiprints. Prefer .exe first
          # so Git Bash does not latch onto a non-existent extension-less path.
          BIN=""
          for cand in \
            target/release/multiprints.exe \
            target/release/multiprints \
            target/x86_64-pc-windows-msvc/release/multiprints.exe
          do
            if [ -f "$cand" ]; then
              BIN="$cand"
              break
            fi
          done
          if [ -z "${BIN}" ]; then
            BIN=$(find target/release -maxdepth 3 -type f \( -name 'multiprints.exe' -o -name 'multiprints' \) | head -1 || true)
          fi
          if [ -z "${BIN}" ] || [ ! -f "$BIN" ]; then
            echo "::error::Could not locate multiprints binary under target/release"
            find target/release -maxdepth 3 -type f | head -50 || true
            exit 1
          fi

          # Prefer Python byte search — `strings` is unreliable/missing on Windows runners.
          PY=python3
          command -v python3 >/dev/null 2>&1 || PY=python
          "$PY" -c "
          import sys
          from pathlib import Path
          bin_path = Path(sys.argv[1])
          host = sys.argv[2].encode('utf-8')
          data = bin_path.read_bytes()
          print(f'Checking binary: {bin_path} ({len(data)} bytes)')
          if host not in data:
              print(f'::error::Turso host {host!r} not found in binary — embed failed')
              for p in Path('target').rglob('embedded_turso.rs'):
                  print(f'---- {p} ----')
                  try:
                      print(p.read_text()[:400])
                  except Exception as e:
                      print(e)
              sys.exit(1)
          print(f'OK: Turso host is embedded in {bin_path}')
          " "$BIN" "$HOST"

      - name: List build artifacts
        run: |
          echo "=== Bundle output ==="
          find target/release/bundle -type f | sort || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          retention-days: 5
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version for release
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "semver=${VERSION#v}" >> $GITHUB_OUTPUT
            echo "Using tag: $VERSION"
          else
            VERSION=$(grep '^version = ' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "semver=$VERSION" >> $GITHUB_OUTPUT
            echo "Using Cargo version: v$VERSION"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: multiprints-*

      - name: List all artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f -name "*" | sort
          echo ""
          echo "=== File Count ==="
          find artifacts -type f | wc -l

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          echo "=== Final Release Assets ==="
          ls -la release-assets/

      - name: Generate updater manifest
        run: |
          python3 <<'PY'
          import datetime
          import json
          import hashlib
          import os
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["RELEASE_TAG"]
          version = os.environ["RELEASE_VERSION"]
          assets = Path("release-assets")
          platforms = {}

          for artifact in assets.iterdir():
              if artifact.suffix == ".sig" or artifact.name == "latest.json":
                  continue
              if artifact.suffix == ".exe":
                  key = "windows-x86_64"
              elif artifact.suffix == ".deb":
                  key = "linux-x86_64"
              else:
                  continue

              digest = hashlib.sha256(artifact.read_bytes()).hexdigest()
              platforms[key] = {
                  "url": f"https://github.com/{repo}/releases/download/{tag}/{artifact.name}",
                  "sha256": digest,
              }

          manifest = {
              "version": version,
              "notes": "Latest MULTIPRINTS release",
              "pub_date": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "platforms": platforms,
          }

          (assets / "latest.json").write_text(json.dumps(manifest, indent=2))
          PY
        env:
          RELEASE_TAG: ${{ steps.get_version.outputs.version }}
          RELEASE_VERSION: ${{ steps.get_version.outputs.semver }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Release Summary
        run: |
          echo "🎉 Build and Release Complete!"
          echo ""
          echo "📦 New release is available at:"
          echo "   https://github.com/${{ github.repository }}/releases"
          echo ""
          echo "🖥️  Platforms built:"
          echo "   • Windows (.exe installer)"
          echo "   • Linux (.deb package)"
