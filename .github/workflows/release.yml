name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Auto Tag on Push"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Build native dependencies
        working-directory: ./app
        run: pnpm exec electron-rebuild

      - name: Build for ${{ matrix.platform }}
        working-directory: ./app
        run: pnpm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts (Linux)
        working-directory: ./app
        run: ls -la dist/ || true
        if: matrix.os == 'ubuntu-latest'

      - name: List build artifacts (Windows)
        working-directory: ./app
        run: Get-ChildItem -Path dist/ -ErrorAction SilentlyContinue
        shell: pwsh
        if: matrix.os == 'windows-latest'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: multiprints-${{ matrix.platform }}
          path: |
            app/dist/*.exe
            app/dist/*.deb
            app/dist/*.yml
            app/dist/*.yaml
            app/dist/*.blockmap
            app/dist/latest*.yml
          retention-days: 5
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_run'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version for release
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Extract version from tag
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Using tag: $VERSION"
          else
            # Get version from package.json
            VERSION=$(cat app/package.json | grep '"version"' | head -1 | sed 's/.*: "\(.*\)".*/\1/' | tr -d ',')
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "Using package.json version: v$VERSION"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: multiprints-*

      - name: List all artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f -name "*" | sort
          echo ""
          echo "=== File Count ==="
          find artifacts -type f | wc -l

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Copy and rename files to avoid duplicates
          for dir in artifacts/multiprints-*; do
            platform=$(basename "$dir")
            for file in "$dir"/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                # Skip duplicate yaml files (keep platform-specific ones)
                if [[ "$filename" == "builder-debug.yml" ]]; then
                  cp "$file" "release-assets/${platform}-${filename}"
                else
                  cp "$file" "release-assets/$filename"
                fi
              fi
            done
          done
          
          echo "=== Final Release Assets ==="
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          files: |
            release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: release
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Release Summary
        run: |
          echo "🎉 Build and Release Complete!"
          echo ""
          echo "📦 New release is available at:"
          echo "   https://github.com/${{ github.repository }}/releases"
          echo ""
          echo "🖥️  Platforms built:"
          echo "   • Windows (.exe installer)"
          echo "   • Linux Ubuntu/Debian (.deb)"
