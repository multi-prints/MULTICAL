name: Test Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  test-build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: test-build-windows
            bundle_glob: target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            artifact_name: test-build-linux
            bundle_glob: target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri bundle
        run: cargo tauri build --bundles ${{ matrix.os == 'windows-latest' && 'nsis' || 'deb' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: |
          echo "=== Bundle output ==="
          find target/release/bundle -type f | sort || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          retention-days: 1
          if-no-files-found: warn

  test-summary:
    needs: test-build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Test Results
        run: |
          echo "✅ Test builds completed!"
          echo ""
          echo "This verifies the app builds successfully on:"
          echo "  • Windows (.exe installer)"
          echo "  • Linux (.deb package)"
          echo ""
          echo "To create a release, push a tag like 'v1.1.0'"
