name: Test Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  test-build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: ./app
        run: pnpm install --frozen-lockfile

      - name: Build native dependencies
        working-directory: ./app
        run: pnpm exec electron-rebuild

      - name: Test build for ${{ matrix.platform }}
        working-directory: ./app
        run: pnpm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts (Linux)
        working-directory: ./app
        run: ls -la dist/ || true
        if: matrix.os == 'ubuntu-latest'

      - name: List build artifacts (Windows)
        working-directory: ./app
        run: Get-ChildItem -Path dist/ -ErrorAction SilentlyContinue
        shell: pwsh
        if: matrix.os == 'windows-latest'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-${{ matrix.platform }}
          path: |
            app/dist/*.exe
            app/dist/*.deb
          retention-days: 1
          if-no-files-found: warn

  test-summary:
    needs: test-build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Test Results
        run: |
          echo "✅ Test builds completed!"
          echo ""
          echo "This verifies the app builds successfully on:"
          echo "  • Windows (.exe installer)"
          echo "  • Linux Ubuntu/Debian (.deb package)"
          echo ""
          echo "To create a release, push a tag like 'v1.0.9'"
