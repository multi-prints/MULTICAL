# MULTIPRINTS Cloudflare Worker — free edge API in front of Turso
name = "multiprints-api"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# Optional custom domain later:
# routes = [{ pattern = "api.yourdomain.com/*", zone_name = "yourdomain.com" }]

# Secrets (set via `wrangler secret put`, never commit):
#   TURSO_DATABASE_URL   — libsql://....turso.io
#   TURSO_AUTH_TOKEN     — Turso auth token
#   API_SECRET           — shared shop key for desktop clients (Bearer)

[vars]
APP_NAME = "MULTIPRINTS API"
